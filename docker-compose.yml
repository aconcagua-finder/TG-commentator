services:
  postgres:
    image: postgres:16-alpine
    container_name: commentator_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  commentator:
    build: .
    container_name: commentator_service
    command: python commentator.py
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./accounts:/app/accounts
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PYTHONUNBUFFERED: "1"
      APP_DATA_DIR: /app/data
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

  admin_web:
    build: .
    container_name: admin_web_service
    command: uvicorn admin_web.main:app --host 0.0.0.0 --port 8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./accounts:/app/accounts
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PYTHONUNBUFFERED: "1"
      APP_DATA_DIR: /app/data
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ADMIN_WEB_USERNAME: ${ADMIN_WEB_USERNAME}
      ADMIN_WEB_PASSWORD: ${ADMIN_WEB_PASSWORD}
      ADMIN_WEB_SECRET: ${ADMIN_WEB_SECRET}

volumes:
  pgdata:
