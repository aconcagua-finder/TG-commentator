{% macro tip(text, placement="top") -%}
  <button
    type="button"
    class="btn btn-sm btn-link p-0 text-body-secondary app-help"
    data-bs-toggle="tooltip"
    data-bs-placement="{{ placement }}"
    data-bs-trigger="hover focus"
    data-bs-title="{{ text }}"
    aria-label="Справка"
  >
    <i class="bi bi-question-circle" aria-hidden="true"></i>
  </button>
{%- endmacro %}
