{% extends "base.html" %}
{% block title %}2FA · TG-комментатор{% endblock %}
{% block content %}
  <h1 class="h3 mb-3">2FA пароль</h1>
  <div class="card">
    <div class="card-body">
      <p class="mb-1">Аккаунт: <span class="mono">{{ session_name }}</span></p>
      <p class="text-muted">Телефон: <span class="mono">{{ phone }}</span></p>
      <form method="post" action="/accounts/new/phone/{{ token }}/password" class="app-inline-form">
        <label class="visually-hidden" for="tg_password">2FA пароль</label>
        <input class="form-control" id="tg_password" type="password" name="password" placeholder="пароль" required />
        <button class="btn btn-primary" type="submit">Войти</button>
      </form>
      <form method="post" action="/accounts/new/phone/{{ token }}/cancel" class="mt-3">
        <button class="btn btn-outline-secondary" type="submit">Отмена</button>
      </form>
    </div>
  </div>
{% endblock %}
